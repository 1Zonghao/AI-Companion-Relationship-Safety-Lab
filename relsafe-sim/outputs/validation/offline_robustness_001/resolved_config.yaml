description: Offline seed and prompt robustness validation using FakeLLMProvider
engine: in_memory
experiment_ref: configs/experiments/mvp_virtual_relationship.yaml
metamorphic_tests:
  enabled: true
  tests:
  - MT-001
  - MT-002
  - MT-003
  - MT-004
  - MT-005
  - MT-006
  - MT-007
output_dir: outputs/validation
prompt_perturbation:
  enabled: true
  max_acceptable_variance: 0.15
  scenario_variants:
    interpersonal_conflict_001: 4
provider: fake
seed_robustness:
  enabled: true
  max_acceptable_std: 0.2
  rank_stability_threshold: 0.2
  seeds:
  - 11
  - 23
  - 37
  - 41
  - 59
  - 71
  - 83
  - 97
  - 101
  - 113
validation_id: offline_robustness_001
validation_type: offline_robustness
version: 1.0.0
